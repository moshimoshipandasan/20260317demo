<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Sky Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="title">Mini Sky Shooter</h1>

      <section class="game-shell">
        <canvas id="gameCanvas" width="480" height="720" aria-label="シューティングゲーム画面"></canvas>
      </section>

      <section class="help" aria-label="操作説明">
        <p>移動: ← → / A D</p>
        <p>発射: Space</p>
        <p>再開: R</p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
